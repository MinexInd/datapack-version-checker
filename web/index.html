<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dpcheck — Datapack / Resource Pack Version Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
    a { color: #58a6ff; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 30px 0 20px; }
    header h1 { font-size: 1.6rem; color: #f0f6fc; }
    header p { color: #8b949e; font-size: 0.9rem; margin-top: 4px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 12px; color: #f0f6fc; }
    label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #8b949e; }
    .mode-group { display: flex; gap: 8px; margin-bottom: 12px; }
    .mode-btn { padding: 8px 16px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #e6edf3; cursor: pointer; font-size: 0.85rem; }
    .mode-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .mode-btn:hover { background: #30363d; }
    .mode-btn.active:hover { background: #388bfd; }
    textarea, input[type="text"] { width: 100%; padding: 10px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: #e6edf3; font-size: 0.9rem; font-family: 'SFMono-Regular', Consolas, monospace; }
    textarea { height: 60px; resize: vertical; }
    .btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .file-zone { border: 2px dashed #30363d; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .file-zone:hover, .file-zone.dragover { border-color: #58a6ff; }
    .file-zone input { display: none; }
    .file-zone p { color: #8b949e; font-size: 0.85rem; }
    .file-zone .count { color: #58a6ff; margin-top: 8px; font-size: 0.8rem; }
    .options-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .options-row label { margin-bottom: 0; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .options-row input[type="checkbox"] { width: 16px; height: 16px; }
    .error { background: #3d1e1e; border: 1px solid #d73a49; border-radius: 6px; padding: 12px; color: #f85149; font-size: 0.85rem; margin-bottom: 12px; }
    .result-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .stat { padding: 12px; border-radius: 6px; text-align: center; }
    .stat.green { background: #1a3a1e; border: 1px solid #238636; }
    .stat.red { background: #3d1e1e; border: 1px solid #d73a49; }
    .stat.blue { background: #0d2468; border: 1px solid #1f6feb; }
    .stat .num { font-size: 1.5rem; font-weight: 700; }
    .stat .label { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
    .version-block { border: 1px solid #30363d; border-radius: 6px; margin-bottom: 8px; }
    .version-header { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 0.9rem; }
    .version-header:hover { background: #1c2128; }
    .version-header .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
    .badge.ok { background: #238636; color: #fff; }
    .badge.fail { background: #d73a49; color: #fff; }
    .badge.outside { background: #7a5c00; color: #fff; }
    .version-body { padding: 0 14px 10px; font-size: 0.8rem; display: none; }
    .version-body.open { display: block; }
    .version-body .issue { padding: 4px 0; color: #f85149; }
    .version-body .issue .loc { color: #8b949e; }
    .version-body .deprec { padding: 4px 0; color: #d29922; }
    .knowledge { font-size: 0.85rem; }
    .knowledge .rule { padding: 6px 0; border-bottom: 1px solid #21262d; }
    .knowledge .rule:last-child { border: none; }
    .knowledge .rule .feature { color: #58a6ff; font-weight: 600; }
    .knowledge .rule .minver { color: #d29922; font-size: 0.8rem; }
    .knowledge .rule .found { color: #8b949e; font-size: 0.8rem; }
    .breaking-change { padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 0.85rem; }
    .breaking-change:last-child { border: none; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress { margin: 12px 0; font-size: 0.85rem; color: #8b949e; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
